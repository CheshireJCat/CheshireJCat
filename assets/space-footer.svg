<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" role="img" aria-labelledby="title">
  <title id="title">See you beyond the event horizon</title>
  <defs><radialGradient id="bg"><stop stop-color="#26104d"/><stop offset=".32" stop-color="#070510"/><stop offset="1" stop-color="#02010a"/></radialGradient><linearGradient id="n"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/></linearGradient><filter id="g" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1200" height="250" fill="url(#bg)"/>
  <g stroke-linecap="round" filter="url(#g)"><g stroke="#22d3ee"><path d="M600 92 490 20"><animate attributeName="d" values="M600 92 590 86;M600 92 260 0" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/></path><path d="M600 92 770 30"><animate attributeName="d" values="M600 92 610 87;M600 92 1030 0" dur="2.6s" begin=".6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.6s" begin=".6s" repeatCount="indefinite"/></path></g><g stroke="#f472b6"><path d="M600 92 330 220"><animate attributeName="d" values="M600 92 590 99;M600 92 0 245" dur="2.3s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.3s" begin="1s" repeatCount="indefinite"/></path><path d="M600 92 930 220"><animate attributeName="d" values="M600 92 610 99;M600 92 1200 245" dur="2.1s" begin=".25s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.1s" begin=".25s" repeatCount="indefinite"/></path></g></g>
  <circle cx="600" cy="92" r="36" fill="none" stroke="url(#n)" stroke-width="3" filter="url(#g)"><animate attributeName="r" values="26;70;26" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/></circle>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle"><text x="600" y="170" fill="url(#n)" font-size="23" font-weight="700" letter-spacing="7" filter="url(#g)">SEE YOU BEYOND THE EVENT HORIZON</text><text x="600" y="205" fill="#64748b" font-size="11" letter-spacing="5">KEEP BUILDING STRANGE AND BEAUTIFUL THINGS</text></g>
</svg>
