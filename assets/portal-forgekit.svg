<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 270" role="img" aria-labelledby="title desc">
  <title id="title">forgeKit portal</title><desc id="desc">A cyan three dimensional portal leading to the forgeKit repository.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#07162a"/></linearGradient><linearGradient id="n"><stop stop-color="#22d3ee"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient><radialGradient id="p"><stop stop-color="#67e8f9" stop-opacity=".75"/><stop offset=".45" stop-color="#0891b2" stop-opacity=".24"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient><filter id="g" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="1" y="1" width="578" height="268" rx="22" fill="url(#bg)" stroke="#22d3ee" stroke-opacity=".32"/>
  <g fill="none" stroke="#22d3ee" opacity=".16"><path d="M0 250 205 153 580 230M26 270 205 153 536 270M79 270 205 153 423 270"/><path d="M54 236H548M96 212H455M137 188H363"/></g>
  <ellipse cx="428" cy="126" rx="112" ry="72" fill="url(#p)"/>
  <g fill="none" filter="url(#g)"><ellipse cx="428" cy="126" rx="82" ry="52" stroke="#22d3ee" stroke-width="3" stroke-dasharray="30 12"><animate attributeName="stroke-dashoffset" values="0;-84" dur="3s" repeatCount="indefinite"/></ellipse><ellipse cx="428" cy="126" rx="64" ry="40" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 10"><animate attributeName="stroke-dashoffset" values="0;64" dur="2.5s" repeatCount="indefinite"/></ellipse><path d="M428 79 460 98 460 135 428 154 396 135 396 98Z" stroke="url(#n)" stroke-width="3"><animateTransform attributeName="transform" type="rotate" from="0 428 117" to="360 428 117" dur="9s" repeatCount="indefinite"/></path></g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><text x="38" y="51" fill="#22d3ee" font-size="10" letter-spacing="3">GATE // 01</text><text x="38" y="94" fill="#e2e8f0" font-size="28" font-weight="800" letter-spacing="2">FORGEKIT</text><text x="38" y="122" fill="#94a3b8" font-size="11" letter-spacing="2">AI-NATIVE APP PRIMITIVES</text><text x="38" y="158" fill="#64748b" font-size="12">Source-owned building blocks</text><text x="38" y="177" fill="#64748b" font-size="12">for enterprise frontends.</text><text x="38" y="225" fill="#67e8f9" font-size="11" font-weight="700" letter-spacing="3">ENTER GATE  →</text></g>
  <circle cx="540" cy="28" r="4" fill="#22d3ee" filter="url(#g)"><animate attributeName="opacity" values=".2;1;.2" dur="1.7s" repeatCount="indefinite"/></circle>
</svg>
