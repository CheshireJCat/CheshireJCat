<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 270" role="img" aria-labelledby="title desc">
  <title id="title">Project Ether portal</title><desc id="desc">A green three dimensional portal leading to the Project Ether repository.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset="1" stop-color="#061b1a"/></linearGradient><linearGradient id="n"><stop stop-color="#34d399"/><stop offset="1" stop-color="#22d3ee"/></linearGradient><radialGradient id="p"><stop stop-color="#6ee7b7" stop-opacity=".7"/><stop offset=".45" stop-color="#059669" stop-opacity=".22"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient><filter id="g" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="1" y="1" width="578" height="268" rx="22" fill="url(#bg)" stroke="#34d399" stroke-opacity=".32"/>
  <g fill="none" stroke="#34d399" opacity=".15"><path d="M0 250 205 153 580 230M26 270 205 153 536 270M79 270 205 153 423 270"/><path d="M54 236H548M96 212H455M137 188H363"/></g>
  <ellipse cx="428" cy="126" rx="112" ry="72" fill="url(#p)"/>
  <g fill="none" filter="url(#g)"><ellipse cx="428" cy="126" rx="82" ry="52" stroke="#34d399" stroke-width="3" stroke-dasharray="30 12"><animate attributeName="stroke-dashoffset" values="0;-84" dur="3.1s" repeatCount="indefinite"/></ellipse><ellipse cx="428" cy="126" rx="64" ry="40" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6 10"><animate attributeName="stroke-dashoffset" values="0;64" dur="2.3s" repeatCount="indefinite"/></ellipse><path d="M428 88 458 112 447 150H409L398 112Z" stroke="url(#n)" stroke-width="3"><animateTransform attributeName="transform" type="rotate" from="0 428 121" to="360 428 121" dur="10s" repeatCount="indefinite"/></path><circle cx="428" cy="121" r="13" stroke="#d1fae5" stroke-width="2"/></g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><text x="38" y="51" fill="#34d399" font-size="10" letter-spacing="3">GATE // 04</text><text x="38" y="94" fill="#e2e8f0" font-size="27" font-weight="800" letter-spacing="1">PROJECT ETHER</text><text x="38" y="122" fill="#94a3b8" font-size="11" letter-spacing="2">A FAN-MADE GAME UNIVERSE</text><text x="38" y="158" fill="#64748b" font-size="12">A playful GDScript expedition</text><text x="38" y="177" fill="#64748b" font-size="12">into the world of Luo Xiaohei.</text><text x="38" y="225" fill="#6ee7b7" font-size="11" font-weight="700" letter-spacing="3">ENTER GATE  →</text></g>
  <circle cx="540" cy="28" r="4" fill="#34d399" filter="url(#g)"><animate attributeName="opacity" values=".2;1;.2" dur="1.8s" repeatCount="indefinite"/></circle>
</svg>
