<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CheshireJCat telemetry hologram</title>
  <desc id="desc">Three perspective holographic panels display repository count, years exploring and current status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#020617"/><stop offset=".5" stop-color="#070510"/><stop offset="1" stop-color="#02010a"/></linearGradient>
    <linearGradient id="cyan"><stop stop-color="#083344" stop-opacity=".75"/><stop offset="1" stop-color="#22d3ee" stop-opacity=".06"/></linearGradient>
    <linearGradient id="violet"><stop stop-color="#2e1065" stop-opacity=".7"/><stop offset="1" stop-color="#c084fc" stop-opacity=".06"/></linearGradient>
    <linearGradient id="pink"><stop stop-color="#500724" stop-opacity=".65"/><stop offset="1" stop-color="#f472b6" stop-opacity=".06"/></linearGradient>
    <linearGradient id="n"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
    <filter id="g" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0H0V22" fill="none" stroke="#22d3ee" stroke-opacity=".07"/></pattern>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <g fill="none" stroke="#8b5cf6" opacity=".12"><path d="M0 360 600 45 1200 360M180 360 600 45 1020 360M380 360 600 45 820 360"/><path d="M120 300H1080M260 226H940M390 158H810"/></g>

  <!-- Isometric hologram panels -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <g><polygon points="96,115 382,88 414,278 66,305" fill="url(#cyan)" stroke="#22d3ee" stroke-opacity=".65"/><path d="M96 115 66 305M382 88 414 278" stroke="#22d3ee" stroke-opacity=".35"/><text x="116" y="155" fill="#67e8f9" font-size="10" letter-spacing="3">PUBLIC REPOSITORIES</text><text x="117" y="225" fill="#e0f2fe" font-size="61" font-weight="800">50+</text><path d="M116 252H344" stroke="#22d3ee" stroke-width="3" stroke-dasharray="20 8"><animate attributeName="stroke-dashoffset" values="0;-56" dur="2s" repeatCount="indefinite"/></path><animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="4.2s" repeatCount="indefinite"/></g>
    <g><polygon points="445,82 755,82 777,283 423,283" fill="url(#violet)" stroke="#c084fc" stroke-opacity=".68"/><text x="600" y="130" text-anchor="middle" fill="#d8b4fe" font-size="10" letter-spacing="3">YEARS EXPLORING</text><text x="600" y="215" text-anchor="middle" fill="#f3e8ff" font-size="68" font-weight="800">10+</text><circle cx="600" cy="244" r="10" fill="none" stroke="#c084fc" filter="url(#g)"><animate attributeName="r" values="4;28;4" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2.8s" repeatCount="indefinite"/></circle><animateTransform attributeName="transform" type="translate" values="0,-4;0,4;0,-4" dur="4.8s" repeatCount="indefinite"/></g>
    <g><polygon points="818,88 1104,115 1134,305 786,278" fill="url(#pink)" stroke="#f472b6" stroke-opacity=".65"/><text x="858" y="155" fill="#f9a8d4" font-size="10" letter-spacing="3">CURRENT FORM</text><text x="855" y="216" fill="#fce7f3" font-size="38" font-weight="800">HUMAN</text><text x="858" y="251" fill="#86efac" font-size="12" letter-spacing="4">● ONLINE</text><rect x="858" y="272" width="210" height="3" fill="#f472b6" opacity=".3"/><rect x="858" y="272" width="55" height="3" fill="#f472b6" filter="url(#g)"><animate attributeName="x" values="858;1013;858" dur="2.6s" repeatCount="indefinite"/></rect><animateTransform attributeName="transform" type="translate" values="0,0;0,-6;0,0" dur="4.4s" begin=".7s" repeatCount="indefinite"/></g>
  </g>
  <path d="M66 326Q180 297 290 328T510 326T730 326T950 326T1134 326" fill="none" stroke="url(#n)" stroke-width="2" filter="url(#g)" stroke-dasharray="12 10"><animate attributeName="stroke-dashoffset" values="0;-88" dur="2.5s" repeatCount="indefinite"/></path>
</svg>
