  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><text x="38" y="51" fill="#f472b6" font-size="10" letter-spacing="3">GATE // 03</text><text x="38" y="94" fill="#e2e8f0" font-size="27" font-weight="800" letter-spacing="1">AFTER HTML5</text><text x="38" y="122" fill="#94a3b8" font-size="11" letter-spacing="2">THE EVOLVING WEB PLATFORM</text><text x="38" y="158" fill="#64748b" font-size="12">New HTML capabilities, production</text><text x="38" y="177" fill="#64748b" font-size="12">guidance and interactive demos.</text><text x="38" y="225" fill="#f9a8d4" font-size="11" font-weight="700" letter-spacing="3">ENTER GATE  →</text></g>
