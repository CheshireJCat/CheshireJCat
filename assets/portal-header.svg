<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 190" role="img" aria-labelledby="title">
  <title id="title">Project portal deck</title>
  <defs><linearGradient id="bg"><stop stop-color="#02010a"/><stop offset=".5" stop-color="#0b0620"/><stop offset="1" stop-color="#020617"/></linearGradient><linearGradient id="n"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#c084fc"/><stop offset="1" stop-color="#f472b6"/></linearGradient><filter id="g" x="-50%" y="-100%" width="200%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect width="1200" height="190" fill="url(#bg)"/>
  <g fill="none" stroke="url(#n)" opacity=".22"><path d="M0 170 600 76 1200 170"/><path d="M0 130 600 76 1200 130"/><path d="M120 190 600 76 1080 190M300 190 600 76 900 190M460 190 600 76 740 190"/></g>
