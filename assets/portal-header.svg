  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle"><text x="600" y="62" fill="url(#n)" font-size="29" font-weight="800" letter-spacing="8" filter="url(#g)">PROJECT PORTALS</text><text x="600" y="94" fill="#64748b" font-size="12" letter-spacing="5">SELECT A DESTINATION</text><text x="600" y="151" fill="#94a3b8" font-size="11" letter-spacing="3">EACH GATE LEADS TO A DIFFERENT EXPERIMENT</text></g>
