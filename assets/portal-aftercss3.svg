<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 270" role="img" aria-labelledby="title desc">
  <title id="title">afterCss3 portal</title><desc id="desc">A violet three dimensional portal leading to the afterCss3 repository.</desc>
  <defs><linearGradient id="bg" x1="0" x2="1"><stop stop-color="#080318"/><stop offset="1" stop-color="#160b32"/></linearGradient><linearGradient id="n"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#f472b6"/></linearGradient><radialGradient id="p"><stop stop-color="#c084fc" stop-opacity=".75"/><stop offset=".45" stop-color="#7c3aed" stop-opacity=".25"/><stop offset="1" stop-color="#020617" stop-opacity="0"/></radialGradient><filter id="g" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <rect x="1" y="1" width="578" height="268" rx="22" fill="url(#bg)" stroke="#c084fc" stroke-opacity=".32"/>
  <g fill="none" stroke="#8b5cf6" opacity=".18"><path d="M0 250 205 153 580 230M26 270 205 153 536 270M79 270 205 153 423 270"/><path d="M54 236H548M96 212H455M137 188H363"/></g>
  <ellipse cx="428" cy="126" rx="112" ry="72" fill="url(#p)"/>
  <g fill="none" filter="url(#g)"><ellipse cx="428" cy="126" rx="82" ry="52" stroke="#c084fc" stroke-width="3" stroke-dasharray="30 12"><animate attributeName="stroke-dashoffset" values="0;-84" dur="3.3s" repeatCount="indefinite"/></ellipse><ellipse cx="428" cy="126" rx="64" ry="40" stroke="#f472b6" stroke-width="2" stroke-dasharray="6 10"><animate attributeName="stroke-dashoffset" values="0;64" dur="2.2s" repeatCount="indefinite"/></ellipse><path d="M395 96H461L451 144H405Z" stroke="url(#n)" stroke-width="3"><animateTransform attributeName="transform" type="rotate" values="-4 428 120;4 428 120;-4 428 120" dur="4s" repeatCount="indefinite"/></path><path d="M411 108H447M409 120H444M407 132H439" stroke="#e9d5ff" stroke-width="2"/></g>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace"><text x="38" y="51" fill="#c084fc" font-size="10" letter-spacing="3">GATE // 02</text><text x="38" y="94" fill="#e2e8f0" font-size="28" font-weight="800" letter-spacing="2">AFTER CSS3</text><text x="38" y="122" fill="#94a3b8" font-size="11" letter-spacing="2">MODERN CSS FIELD GUIDE</text><text x="38" y="158" fill="#64748b" font-size="12">Explore the capabilities that</text><text x="38" y="177" fill="#64748b" font-size="12">arrived after CSS3.</text><text x="38" y="225" fill="#d8b4fe" font-size="11" font-weight="700" letter-spacing="3">ENTER GATE  →</text></g>
  <circle cx="540" cy="28" r="4" fill="#c084fc" filter="url(#g)"><animate attributeName="opacity" values=".2;1;.2" dur="1.9s" repeatCount="indefinite"/></circle>
</svg>
